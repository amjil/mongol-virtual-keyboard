name: cljd_example
description: "Example app for mongol_virtual_keyboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  archive: ^4.0.7
  mongol: ^9.0.0
  mongol_code: ^1.0.4
  http: ^1.5.0
  vibration: ^3.1.4
  uuid: ^4.5.1
  lifecycle: ^0.10.0
  path_provider: ^2.1.5
  mongol_virtual_keyboard:
    path: .clojuredart/deps/6bc7607e287fc13f3997012e8a57e372a9e9d572dd78aae7a740cbf2f3a43f42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/next.zip
    - assets/fonts/OyunQaganTig.ttf
    - assets/fst/token_table.bin
    - assets/fst/dict.bin
    - assets/fst/dict.idx
    - assets/fst/lists.bin
    - assets/fst/lists.idx
    - assets/fst/keys.json
  fonts:
    - family: OyunQaganTig
      fonts:
        - asset: assets/fonts/OyunQaganTig.ttf
